# /etc/weather/config.ini
# Configuration du backend Weather Network
#
# Copiez ce fichier vers /etc/weather/config.ini et remplissez vos identifiants.
# Les variables d'environnement WEATHER_* peuvent surcharger ces valeurs.

[mqtt]
# ── Broker MQTT de l'université (accessible via VPN WireGuard) ──
# Remplacer par l'IP / hostname du broker MQTT de la fac
host     = mqtt.univ-cotedazur.fr
port     = 443
# Mettre à true si le broker requiert TLS (port 8883 en général)
tls      = true
# Laisser vide si le broker n'a pas d'authentification
username = fablab2122
password = 2122
# Topic MQTT — doit correspondre à ce que le bridge TTN publie
topic    = ttn/v3/fablab2223@ttn/devices/weather-station-davis
client_id = weather-datacenter
keepalive = 60

[database]
# ── MariaDB locale sur le Raspberry Pi ──
host     = localhost
port     = 3306
user     = weather
password = CHANGE_ME
database = weather_network

[storage]
# Répertoire de stockage des images du ciel
image_dir = /var/weather/images

[alerting]
# Activer/désactiver le système d'alertes
enabled = true
# Seuils de température (°C)
temperature_min = -10
temperature_max = 50
# Seuils d'humidité (%)
humidity_min = 0
humidity_max = 100
# Seuil batterie minimum (%)
battery_min = 10

[api]
# Serveur API interne (utilisé par le frontend web)
host = 0.0.0.0
port = 5000
# Nombre de mesures retournées par page
page_size = 100
