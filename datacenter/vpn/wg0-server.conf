# /etc/wireguard/wg0.conf  (University VPN Gateway – SERVER)
# Replace the placeholder keys with your generated keys.

[Interface]
Address    = 10.200.0.1/24
ListenPort = 51820
PrivateKey = <SERVER_PRIVATE_KEY>

# NAT: allow peers to reach university MQTT broker
PostUp   = iptables -A FORWARD -i wg0 -j ACCEPT; \
           iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE
PostDown = iptables -D FORWARD -i wg0 -j ACCEPT; \
           iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE

# ─── Raspberry Pi data center ─────────────────────────────────────────────────
[Peer]
# Raspberry Pi public key
PublicKey  = <RASPI_PUBLIC_KEY>
AllowedIPs = 10.200.0.2/32
