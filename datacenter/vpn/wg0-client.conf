# /etc/wireguard/wg0.conf  (Raspberry Pi – CLIENT)
# Replace the placeholder keys with your generated keys.

[Interface]
Address    = 10.200.0.2/24
PrivateKey = <RASPI_PRIVATE_KEY>
DNS        = 10.200.0.1

[Peer]
# University VPN gateway public key
PublicKey  = <SERVER_PUBLIC_KEY>
Endpoint   = <SERVER_PUBLIC_IP>:51820
# Route all traffic destined for the university subnet through the tunnel
AllowedIPs = 10.200.0.0/24
PersistentKeepalive = 25
