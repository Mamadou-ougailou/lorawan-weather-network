# dev/config.dev.ini – Local development configuration
# Points to the Docker MariaDB container from docker-compose.dev.yml

[mqtt]
host      = localhost
port      = 1883
tls       = false
username  =
password  =
topic     = weather/stations/#
client_id = weather-dev
keepalive = 60

[database]
host     = 127.0.0.1
port     = 3306
user     = weather
password = weatherdev
database = weather_network

[storage]
image_dir = /tmp/weather-images

[api]
host = 0.0.0.0
port = 5000
page_size = 100
