# Development stack – emulates the Raspberry Pi datacenter locally
# Usage: docker compose -f dev/docker-compose.dev.yml up -d

services:
  mariadb:
    image: mariadb:11
    container_name: weather-dev-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: rootdev B-WL5M-SUBG1 
      MARIADB_DATABASE: weather_network
      MARIADB_USER: weather
      MARIADB_PASSWORD: weatherdev
    volumes:
      - ../datacenter/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - weather_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  weather_data:
