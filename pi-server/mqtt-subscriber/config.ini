# /etc/weather/config.ini
# Configuration du backend Weather Network
#
# Copiez ce fichier vers /etc/weather/config.ini et remplissez vos identifiants.
# Les variables d'environnement WEATHER_* peuvent surcharger ces valeurs.

[mqtt]
# ── Broker MQTT de l'université (accessible via VPN WireGuard) ──
host      = mqtt.univ-cotedazur.fr
port      = 443
tls       = true
username  = fablab2122
password  = 2122
client_id = weather-datacenter
keepalive = 60

[database]
# ── MariaDB locale sur le Raspberry Pi ──
host     = localhost
port     = 3306
user     = weather
password = weatherdev
database = weather_network

[alerting]
# ── Système d'alertes ──
# Tous les seuils ici sont auto-détectés : <champ>_min / <champ>_max
# Le champ doit correspondre à une clé de [field_mapping].
enabled         = true
temperature_min = -10
temperature_max = 50
humidity_min    = 0
humidity_max    = 100

[field_mapping]
# ── Correspondance champs internes ↔ clés du payload MQTT ──
# Format : colonne_bdd = clé_dans_le_payload
# Ajouter une nouvelle ligne ici suffit à capturer un nouveau capteur.
# La colonne_bdd doit exister dans la table `measurements`.
temperature    = temp1
humidity       = humid 
pressure       = pressure # à changer
lux            = lux #à changer
wind_speed     = vitvent
wind_direction = dirvent
rain_quantity  = hpluie

[stations]
# ── Configuration des stations météo ──
# Format : topic_mqtt = site_id
# Le client MQTT s'abonnera automatiquement à tous les topics listés ici.
ttn/v3/fablab2223@ttn/devices/weather-station-davis/up = 1
ttn/v3/fablab2223@ttn/devices/l3-arduino-mega-meteo/up = 2
#ttn/v3/mougins/devices/station1/up = 3

[api]
# Serveur API interne (utilisé par le frontend web)
host      = 0.0.0.0
port      = 5000
page_size = 100
