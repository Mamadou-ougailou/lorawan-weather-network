# docker-compose.yml – Raspberry Pi Server Stack
# Lance les 3 composants principaux du serveur : Base de données, Datacenter (mqtt-subscriber) et API Web

services:
  mariadb:
    image: mariadb:11
    container_name: weather-db
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MARIADB_ROOT_PASSWORD: rootdev
      MARIADB_DATABASE: weather_network
      MARIADB_USER: weather
      MARIADB_PASSWORD: weatherdev
    volumes:
      - ./mqtt-subscriber/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - weather_pi_db:/var/lib/mysql
    networks:
      - weather_net
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Datacenter (MQTT Subscriber) ─────────────────────────────────────────
  subscriber:
    build: ./mqtt-subscriber
    container_name: weather-subscriber
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    env_file: .env
    networks:
      - weather_net

  # ─── Node.js REST API ─────────────────────────────────────────────────────
  api:
    build: ./api
    container_name: weather-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:${API_PORT:-3000}"
    env_file: .env
    environment:
      MQTT_CLIENT_ID: ${MQTT_CLIENT_ID_API}
    networks:
      - weather_net
    depends_on:
      mariadb:
        condition: service_healthy

volumes:
  weather_pi_db:

networks:
  weather_net:
    name: weather_net
