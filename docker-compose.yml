# docker-compose.yml  –  Development stack (MariaDB + Node.js API)
# Run from the project root:
#   sudo docker compose up -d --build

services:

  # ─── MariaDB ──────────────────────────────────────────────────────────────
  mariadb:
    image: mariadb:11
    container_name: weather-dev-db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MARIADB_ROOT_PASSWORD: rootdev
      MARIADB_DATABASE: weather_network
      MARIADB_USER: weather
      MARIADB_PASSWORD: weatherdev
    volumes:
      - ./datacenter/database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
      - ./dev/seed_data.sql:/docker-entrypoint-initdb.d/02-seed.sql:ro
      - weather_data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "healthcheck.sh", "--connect", "--innodb_initialized" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # ─── Node.js REST API ─────────────────────────────────────────────────────
  api:
    build: ./web/backend
    container_name: weather-dev-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      PORT: 3000
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_USER: weather
      DB_PASSWORD: weatherdev
      DB_NAME: weather_network
      IMAGE_DIR: /var/weather/images
    volumes:
      - weather_images:/var/weather/images
    depends_on:
      mariadb:
        condition: service_healthy

  # ─── React Frontend ───────────────────────────────────────────────────────
  frontend:
    build: ./web/frontend/react-app
    container_name: weather-dev-frontend
    restart: unless-stopped
    ports:
      - "80:80"     # Prod build served by Nginx on port 80
      - "5173:5173" # Dev server fallback port
    depends_on:
      - api


volumes:
  weather_data:
  weather_images:
