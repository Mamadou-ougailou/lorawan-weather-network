<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WeatherNet PACA</title>
    <!-- Google Fonts & Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;900&family=Manrope:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-tertiary-container": "#000000",
              "surface": "rgb(var(--color-surface) / <alpha-value>)",
              "on-error": "#490006",
              "surface-container-highest": "rgb(var(--color-surf-highest) / <alpha-value>)",
              "on-primary": "#511f00",
              "secondary": "#2db7f2",
              "primary-fixed-dim": "#f06c0b",
              "error-container": "#9f0519",
              "primary-dim": "#fd761a",
              "on-secondary-fixed-variant": "#005777",
              "inverse-on-surface": "#52555c",
              "on-tertiary-fixed": "#270048",
              "on-secondary-container": "#f2f9ff",
              "surface-container-lowest": "#000000",
              "on-surface-variant": "rgb(var(--color-on-surf-var) / <alpha-value>)",
              "secondary-fixed-dim": "#73ceff",
              "surface-container-low": "rgb(var(--color-surf-low) / <alpha-value>)",
              "inverse-surface": "#f9f9ff",
              "on-background": "rgb(var(--color-on-surf) / <alpha-value>)",
              "tertiary-fixed-dim": "#c488ff",
              "on-primary-fixed-variant": "#4e1e00",
              "error-dim": "#d7383b",
              "surface-container": "rgb(var(--color-surf-cont) / <alpha-value>)",
              "on-tertiary": "#33005b",
              "tertiary": "#c180ff",
              "surface-dim": "rgb(var(--color-surface) / <alpha-value>)",
              "secondary-container": "#00668a",
              "inverse-primary": "#9e4400",
              "secondary-fixed": "#9bdaff",
              "on-error-container": "#ffa8a3",
              "on-primary-fixed": "#000000",
              "on-primary-container": "#3f1700",
              "tertiary-fixed": "#ce9bff",
              "on-surface": "rgb(var(--color-on-surf) / <alpha-value>)",
              "primary-container": "#ff7a23",
              "tertiary-container": "#af5cfe",
              "primary": "#ff9153",
              "background": "rgb(var(--color-surface) / <alpha-value>)",
              "error": "#ff716c",
              "on-secondary": "#003044",
              "surface-variant": "rgb(var(--color-surf-cont) / <alpha-value>)",
              "tertiary-dim": "#9c48ea",
              "surface-tint": "#ff9153",
              "on-secondary-fixed": "#00394f",
              "surface-container-high": "rgb(var(--color-surf-high) / <alpha-value>)",
              "outline-variant": "#45484f",
              "surface-bright": "#282c36",
              "secondary-dim": "#05a9e3",
              "primary-fixed": "#ff7a23",
              "outline": "#73757d",
              "on-tertiary-fixed-variant": "#560094"
            },
            fontFamily: {
              "headline": ["Space Grotesk", "sans-serif"],
              "body": ["Manrope", "sans-serif"],
              "label": ["Manrope", "sans-serif"]
            },
            borderRadius: {"DEFAULT": "0.5rem", "lg": "0.5rem", "xl": "1.5rem", "full": "9999px"},
          },
        },
      }
    </script>
    <style>
        :root {
          --color-surface: 248 250 252;
          --color-on-surf: 15 23 42;
          --color-on-surf-var: 71 85 105;
          --color-surf-low: 241 245 249;
          --color-surf-cont: 226 232 240;
          --color-surf-high: 226 232 240;
          --color-surf-highest: 203 213 225;
        }
        
        html.dark {
          --color-surface: 11 14 20;
          --color-on-surf: 236 237 246;
          --color-on-surf-var: 169 171 179;
          --color-surf-low: 16 19 26;
          --color-surf-cont: 22 26 33;
          --color-surf-high: 28 32 40;
          --color-surf-highest: 34 38 47;
        }
        .material-symbols-outlined { font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24; }
        .glass-panel { background: rgba(16, 19, 26, 0.7); backdrop-filter: blur(20px); }
        .hero-gradient { background: linear-gradient(135deg, rgba(255, 145, 83, 0.15) 0%, rgba(11, 14, 20, 0) 60%); }
        .data-glow { text-shadow: 0 0 20px rgba(255, 145, 83, 0.4); }
    </style>
  </head>
  <body>
    <div id="root" class="bg-background text-on-surface font-body min-h-screen"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
